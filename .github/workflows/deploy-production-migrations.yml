name: Production Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - prisma/migrations/**
      - prisma/schema.prisma
  workflow_dispatch:

jobs:
  production-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (workflow context only)
        uses: actions/checkout@v3

      - name: Setup SSH authentication
        run: |
          mkdir -p ~/.ssh

          # Inject SSH private key (GitHub Actions -> VPS)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/github_to_server
          chmod 600 ~/.ssh/github_to_server

          # Trust server (avoid MITM)
          ssh-keyscan -H 91.134.143.115 >> ~/.ssh/known_hosts

          # SSH config
          cat <<EOF > ~/.ssh/config
          Host ovh-cloudpanel-server
            HostName 91.134.143.115
            User pole-g-api-plagix
            IdentityFile ~/.ssh/github_to_server
            IdentitiesOnly yes
          EOF

          chmod 600 ~/.ssh/config

      - name: Deploy migrations on server
        run: |
          ssh ovh-cloudpanel-server bash -s << 'ENDSSH'
            set -e

            # Injection directe des binaires Node/NPM/PM2 dans le PATH
            export PATH="/home/pole-g-api-plagix/.nvm/versions/node/v22.22.3/bin:$PATH"
            echo "Node: $(node -v)"
            echo "NPM: $(npm -v)"

            APP_DIR="/home/pole-g-api-plagix/htdocs/api.plagix.pole-g.org"
            SHARED_DIR="/home/pole-g-api-plagix/shared"
            REPO="git@github.com:hicodingx/plagix-backend.git"
            BRANCH="main"

            cd "$APP_DIR"

            git config --global --add safe.directory "$APP_DIR"

            if [ ! -d .git ]; then
              echo "First deploy safe mode"
              git clone -b "$BRANCH" "$REPO" .
            else
              echo "Updating code safely"
              git fetch origin
              git reset --hard origin/$BRANCH
              git clean -fd
            fi

            # Gestion du fichier .env de production
            if [ -f "$SHARED_DIR/.env" ]; then
              echo "Injecting production .env file"
              cp "$SHARED_DIR/.env" "$APP_DIR/.env"
            else
              echo "ERROR: Production .env file not found in $SHARED_DIR"
              exit 1
            fi

            echo "Installing dependencies"
            npm ci

            echo "Checking Playwright Chromium cache on VPS..."
            if [ -d "$HOME/.cache/ms-playwright" ] && [ "$(ls -A $HOME/.cache/ms-playwright 2>/dev/null)" ]; then
              echo "Chromium binary found in VPS cache. Skipping download."
            else
              echo "Chromium binary missing. Downloading via Playwright..."
              npx playwright install chromium
            fi

            echo "Ensuring Linux system dependencies are met..."
            npx playwright install-deps chromium || echo "Warning: System deps setup skipped"

            echo "Generating Prisma client"
            npx prisma generate

            echo "Running migrations"
            npx prisma migrate deploy

            npx prisma db seed

            echo "Migrations deployment successful"
          ENDSSH